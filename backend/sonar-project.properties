# ============================================================
# Configuracao do SonarQube / SonarScanner  (entregavel QSS)
# ============================================================
sonar.projectKey=eventos-academicos-backend
sonar.projectName=Eventos Academicos - Backend
sonar.projectVersion=1.0

# Codigo-fonte analisado e testes
sonar.sources=src
sonar.tests=tests
sonar.sourceEncoding=UTF-8

# Cobertura de testes (gerada por: npm run test:coverage)
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Exclusoes (nao fazem parte da analise de qualidade do codigo de negocio)
sonar.exclusions=node_modules/**,coverage/**,data/**,src/database/seed.js
sonar.coverage.exclusions=tests/**,src/server.js,src/database/**,src/config/**

# Para SonarQube self-hosted, defina via CLI ou no .env do scanner:
#   sonar.host.url=http://localhost:9000
#   sonar.token=<seu_token>
